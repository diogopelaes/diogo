<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <title>Google Colab - Prof. Diogo Pelaes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="img/favicon.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      /* Ajuste fino para o grid de links do colab para suportar muitos itens se necessário */
      .colab-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 2rem;
        width: 100%;
      }

      /* Badge de status não existe no CSS original, mantendo uma versão mínima e elegante */
      .status-badge {
        position: absolute;
        top: 1rem;
        right: 1rem;
        padding: 0.2rem 0.6rem;
        border-radius: 2rem;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        background: rgba(34, 197, 94, 0.1);
        color: #22c55e;
        border: 1px solid rgba(34, 197, 94, 0.2);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <nav class="top-nav">
        <a href="index.html" class="back-button" title="Voltar para o Início">
          <i data-lucide="arrow-left"></i>
        </a>
      </nav>

      <header>
        <div class="logo-container">
          <img src="img/CEMEP.jpeg" alt="Logo CEMEP" class="logo" />
        </div>
        <h1>Google Colab</h1>
        <p class="subtitle">Atividades práticas e notebooks interativos</p>
      </header>

      <div id="colab-container">
        <div class="loading-spinner">
          <div class="spinner"></div>
          <p>Carregando atividades...</p>
        </div>
      </div>

      <footer>
        <i data-lucide="code-2" style="width: 20px"></i>
        <span>Matemática - 2026</span>
      </footer>
    </div>

    <script>
      // Initialize Lucide icons
      lucide.createIcons();

      // Fetch and render Colab links
      async function loadColabLinks() {
        const container = document.getElementById('colab-container');
        
        try {
          const response = await fetch('colab_links.json');
          if (!response.ok) throw new Error('Não foi possível carregar os links.');
          
          const links = await response.json();
          
          if (!links || links.length === 0) {
            container.innerHTML = `
              <div class="loading-spinner">
                <i data-lucide="folder-open" style="width: 48px; height: 48px; opacity: 0.5;"></i>
                <p>Nenhuma atividade encontrada no momento.</p>
              </div>
            `;
            lucide.createIcons();
            return;
          }

          let html = '<div class="colab-grid">';
          
          links.forEach(link => {
            html += `
              <a href="${link.url}" target="_blank" class="nav-card" style="position: relative;">
                ${link.status === 'ativo' ? '<span class="status-badge">Ativo</span>' : ''}
                <div class="icon-circle">
                  <i data-lucide="binary" style="width: 40px; height: 40px"></i>
                </div>
                <div>
                  <h2 class="card-title">${link.titulo}</h2>
                  <p class="card-desc">Clique para abrir no Google Colab</p>
                </div>
              </a>
            `;
          });

          html += '</div>';
          container.innerHTML = html;
          
          // Re-initialize icons for dynamic content
          lucide.createIcons();

        } catch (error) {
          console.error('Erro:', error);
          container.innerHTML = `
            <div class="loading-spinner">
              <i data-lucide="alert-circle" style="width: 48px; height: 48px; color: #ef4444;"></i>
              <p class="error-msg">Erro ao carregar as atividades. Por favor, tente novamente.</p>
            </div>
          `;
          lucide.createIcons();
        }
      }

      // Execute on load
      window.addEventListener('DOMContentLoaded', loadColabLinks);
    </script>
  </body>
</html>
