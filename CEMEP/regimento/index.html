<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Questionário de Regimento Escolar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Matriz de Decisões para construção do Regimento Escolar do CEMEP." />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Google Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css?v=1.0.3" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body>
    <div class="container">
      <header id="main-header">
        <h1 id="main-title">Carregando...</h1>
        <p class="subtitle" id="main-subtitle"></p>
      </header>

      <!-- Loading Fallback -->
      <div class="loading-screen" id="loading-screen">
        <div class="spinner-large"></div>
        <p>Carregando questionário...</p>
      </div>

      <!-- HOME VIEW -->
      <div id="view-home" style="display: none;" class="view-fade">

        <!-- Info Rules (Deve/Não deve abordar) -->
        <div class="info-section" id="info-section"></div>

        <!-- Welcome Action Card -->
        <div class="action-card">
          <div class="action-card-content">
            <h2>Pronto para iniciar?</h2>
            <p>Responda às perguntas detalhadas para subsidiar a elaboração do Regimento Escolar da sua instituição.</p>

            <div class="welcome-buttons">
              <!-- Single dynamic button: changes between Iniciar / Continuar -->
              <button class="btn btn-start" id="btn-action-main">
                <i data-lucide="play"></i>
                Iniciar Questionário
              </button>

              <!-- File Import -->
              <div class="file-input-wrapper">
                <button class="btn btn-secondary" id="btn-import-trigger">
                  <i data-lucide="upload"></i>
                  Carregar respostas.md
                </button>
                <input type="file" id="btn-import" accept=".md" />
              </div>
            </div>

            <!-- Import feedback message -->
            <p class="import-status" id="import-status" style="display: none;"></p>
          </div>
        </div>

        <!-- Expected Result Card -->
        <div class="outro-card">
          <h3>Resultado Esperado</h3>
          <p id="outro-text"></p>
        </div>

      </div>

      <footer id="main-footer">
        <i data-lucide="user-round" style="width: 20px"></i>
        <span>Prof. Diogo Pelaes</span>
      </footer>
    </div>

    <!-- Notification Toast -->
    <div class="notification-toast" id="toast">
      <i id="toast-icon"></i>
      <span id="toast-message">Mensagem</span>
    </div>

    <script src="script.js?v=1.0.3"></script>
  </body>
</html>
