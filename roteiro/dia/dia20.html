<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Studios Hollywood - Roteiro</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
    color:#222;
    margin:0;
    padding:15px;
    line-height:1.5;
}
h1,h2{
    color:#0d47a1;
}
.card{
    background:#fff;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
}
label{
    display:block;
    margin:8px 0;
    font-size:16px;
}
input[type=checkbox]{
    transform:scale(1.3);
    margin-right:10px;
}
ul{
    margin-top:8px;
}
.destaque{
    background:#fff8dc;
    border-left:5px solid #ff9800;
}
</style>

</head>
<body>

<h1>🎬 Universal Studios Hollywood</h1>
<p><strong>Horário:</strong> 09:00 às 21:00</p>

<div class="card destaque">
<h2>🎯 Prioridades do dia</h2>

<label><input type="checkbox">Super Nintendo World</label>
<label><input type="checkbox">Mario Kart: Bowser's Challenge</label>
<label><input type="checkbox">Toadstool Cafe (11h45)</label>
<label><input type="checkbox">Jurassic World</label>
<label><input type="checkbox">Jurassic World - The Ride</label>

</div>

<div class="card">
<h2>🚗 07:15 - Saída</h2>

<label><input type="checkbox">Sair de casa</label>
<label><input type="checkbox">Chegar ao estacionamento entre 8h00 e 8h15</label>
<label><input type="checkbox">Estar na entrada do parque às 8h30</label>

</div>

<div class="card">
<h2>🍄 09:00 - Super Nintendo World</h2>

<label><input type="checkbox">Ir direto para a área Nintendo</label>
<label><input type="checkbox">Mario Kart: Bowser's Challenge</label>
<label><input type="checkbox">Explorar o Castelo do Bowser</label>
<label><input type="checkbox">Explorar o Castelo da Peach</label>
<label><input type="checkbox">Fotos da área</label>
<label><input type="checkbox">Conhecer Mario, Luigi ou Peach (se a fila estiver pequena)</label>
<label><input type="checkbox">Visitar a loja Nintendo</label>

</div>

<div class="card">
<h2>🍄 11:45 - Toadstool Cafe</h2>

<label><input type="checkbox">Chegar cerca de 10 minutos antes</label>
<label><input type="checkbox">Almoçar</label>
<label><input type="checkbox">Tirar mais algumas fotos antes de sair da área</label>

</div>

<div class="card">
<h2>🦖 12:45 - Jurassic World</h2>

<label><input type="checkbox">Jurassic World - The Ride</label>
<label><input type="checkbox">Encontrar a Blue (Velociraptor)</label>
<label><input type="checkbox">Passear pela área Jurassic</label>
<label><input type="checkbox">Fotos</label>
<label><input type="checkbox">Visitar a loja Jurassic World</label>

</div>

<div class="card">
<h2>🎢 Lower Lot</h2>

<label><input type="checkbox">Revenge of the Mummy</label>
<label><input type="checkbox">Transformers: The Ride 3D</label>

</div>

<div class="card">
<h2>🧙 Upper Lot</h2>

<label><input type="checkbox">Harry Potter and the Forbidden Journey</label>
<label><input type="checkbox">Passear por Hogsmeade</label>
<label><input type="checkbox">Flight of the Hippogriff (se a fila estiver pequena)</label>
<label><input type="checkbox">The Secret Life of Pets</label>

</div>

<div class="card">
<h2>🌇 Final da tarde</h2>

<label><input type="checkbox">Jantar</label>
<label><input type="checkbox">Studio Tour</label>

</div>

<div class="card">
<h2>🌙 Última hora do parque</h2>

<label><input type="checkbox">Repetir Mario Kart (se a fila estiver baixa)</label>
<label><input type="checkbox">OU repetir Jurassic World</label>
<label><input type="checkbox">OU repetir Revenge of the Mummy</label>

</div>

<div class="card destaque">
<h2>📌 Deixar para a próxima visita</h2>

<label><input type="checkbox">WaterWorld</label>
<label><input type="checkbox">Simpsons Ride</label>
<label><input type="checkbox">Kung Fu Panda</label>
<label><input type="checkbox">DreamWorks Theatre</label>
<label><input type="checkbox">Shows e personagens</label>

</div>

</body>
</html>
