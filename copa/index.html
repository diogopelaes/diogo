<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Copa do Mundo FIFA 2026</title>
<meta name="description" content="Acompanhe jogos, resultados e classificação da Copa do Mundo FIFA 2026 em tempo real. EUA, México e Canadá."/>
<link rel="icon" type="image/png" href="soccer-ball.png"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bebas+Neue&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
html{background:#080c18;scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#080c18;color:#e2e8f0;min-height:100vh}
.bebas{font-family:'Bebas Neue',sans-serif}

/* ── HERO ─────────────────────────────────── */
.hero{
  background:linear-gradient(160deg,#080c18 0%,#0e1628 55%,#12082a 100%);
  border-bottom:1px solid rgba(255,255,255,0.06);
  position:relative;overflow:hidden;
  padding:32px 16px
}
.hero-body{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:28px;
  justify-content:space-between
}
.hero-brand{
  display:flex;
  align-items:center;
  gap:20px
}
.hero-status{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:8px
}
.hero::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 80% at 15% 50%,rgba(0,156,59,0.07) 0%,transparent 100%),
    radial-gradient(ellipse 60% 80% at 85% 50%,rgba(245,166,35,0.06) 0%,transparent 100%)
}
.trophy-glow{filter:drop-shadow(0 0 18px rgba(245,166,35,0.55))}

/* ── MAIN TABS ────────────────────────────── */
.main-tabs{
  display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,0.08);
  background:#0a0f1e;position:sticky;top:0;z-index:100;
  justify-content:center
}
.main-tab{
  flex:1;padding:14px 8px;font-size:.82rem;font-weight:700;letter-spacing:.5px;
  cursor:pointer;transition:all .25s;border:none;background:transparent;
  color:#475569;border-bottom:3px solid transparent;display:flex;align-items:center;
  justify-content:center;gap:8px;max-width:200px;
}
.main-tab.active{color:#f5a623;border-bottom-color:#f5a623;background:rgba(245,166,35,0.05)}
.main-tab:hover:not(.active){color:#94a3b8;background:rgba(255,255,255,0.03)}

/* ── CARDS ────────────────────────────────── */
.card{background:#0f1523;border:1px solid rgba(255,255,255,0.06);border-radius:14px}
.match-card{
  background:#0f1523;border:1px solid rgba(255,255,255,0.07);border-radius:12px;
  transition:border-color .2s,transform .15s,box-shadow .2s;
  position:relative;overflow:hidden;
  width:100%;max-width:340px
}
.match-card:hover{border-color:rgba(245,166,35,0.25);transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.5)}
.match-card.brazil{border-color:rgba(0,156,59,0.35);background:linear-gradient(135deg,#0a1a0f 0%,#0f1523 100%)}
.match-card.brazil:hover{border-color:rgba(0,156,59,0.6);box-shadow:0 6px 24px rgba(0,156,59,0.12)}
.brazil-bar{position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,#009C3B,#FFDF00,#002776);border-radius:12px 0 0 12px}
.match-card.live-card{border-color:rgba(239,68,68,0.35)!important;animation:live-border 3s ease-in-out infinite}
@keyframes live-border{0%,100%{border-color:rgba(239,68,68,0.35)}50%{border-color:rgba(239,68,68,0.65)}}

/* ── STATUS BADGES ────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:.6rem;font-weight:700;letter-spacing:1px;border-radius:5px;padding:2px 7px;white-space:nowrap}
.badge-live{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.45);color:#ef4444}
.badge-live .dot{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:pulse-dot 1.2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.badge-ft{background:rgba(100,116,139,0.15);border:1px solid rgba(100,116,139,0.3);color:#94a3b8}
.badge-sched{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.25);color:#f5a623}
.badge-et{background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.4);color:#a855f7}
.badge-pen{background:rgba(234,179,8,0.15);border:1px solid rgba(234,179,8,0.45);color:#eab308}
.badge-brazil{background:rgba(0,156,59,0.15);border:1px solid rgba(0,156,59,0.4);color:#22c55e;font-size:.55rem}

/* ── SCORES ───────────────────────────────── */
.score-block{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:80px}
.score-main{font-size:1.5rem;font-weight:800;letter-spacing:2px;line-height:1}
.score-ht{font-size:.6rem;color:#4a5568;font-weight:500}
.score-pen{font-size:.72rem;color:#eab308;font-weight:700;letter-spacing:.5px}
.score-sep{color:#2d3748;font-size:1.1rem;font-weight:800;margin:0 2px}
.no-score{font-size:1.1rem;font-weight:700;color:#374151}

/* ── TEAMS ────────────────────────────────── */
.team-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:0}
.team-flag{font-size:2.2rem;line-height:1;display:flex;align-items:center;justify-content:center}
.team-flag img{width:1em;height:1em;margin:0;vertical-align:middle;object-fit:contain}
.team-code{font-size:.78rem;font-weight:800;letter-spacing:1.5px;color:#e2e8f0;line-height:1}
.team-code.winner{color:#f5a623}
.team-code.tbd{color:#374151;font-style:italic;letter-spacing:0}
.team-name{font-size:.6rem;font-weight:500;color:#475569;text-align:center;line-height:1.2;max-width:90px}
.team-name.winner{color:#f5a623}
.team-name.tbd{color:#374151;font-style:italic}

/* ── GOALS ────────────────────────────────── */
.goal-item{font-size:.62rem;color:#64748b;white-space:nowrap}
.goal-item .min{color:#f5a623;font-weight:600}
.goal-item .pen-mark{color:#eab308}
.goal-item .og-mark{color:#ef4444}

/* ── META ─────────────────────────────────── */
.meta-row{font-size:.62rem;color:#334155;text-align:center;line-height:1.6}
.meta-time{color:#f5a623;font-weight:600}

/* ── SECTION HEADERS ──────────────────────── */
.round-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.round-pill{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.25);border-radius:20px;padding:4px 14px;font-size:.72rem;font-weight:700;color:#f5a623;letter-spacing:.8px}
.round-line{flex:1;height:1px;background:linear-gradient(to right,rgba(245,166,35,0.15),transparent)}

/* ── FILTER BAR ───────────────────────────── */
.filter-section{background:#0d1220;border-bottom:1px solid rgba(255,255,255,0.06);padding:10px 0;position:sticky;top:49px;z-index:90}
.filter-chip{padding:5px 14px;border-radius:20px;font-size:.72rem;font-weight:600;letter-spacing:.3px;cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,0.08);background:transparent;color:#475569}
.filter-chip.active{background:rgba(245,166,35,0.12);border-color:rgba(245,166,35,0.4);color:#f5a623}
.filter-chip:hover:not(.active){background:rgba(255,255,255,0.04);color:#64748b;border-color:rgba(255,255,255,0.12)}
.filter-chip.live-chip.active{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.4);color:#ef4444}

.sel-wrap{position:relative;display:flex;align-items:center}
select{background:#111827;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e2e8f0;padding:6px 28px 6px 10px;font-size:.72rem;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;transition:border-color .2s;font-family:'Inter',sans-serif}
select:focus{border-color:#f5a623}
.sel-wrap i{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:#475569;font-size:.65rem;pointer-events:none}

/* Date filter */
input[type="date"]{background:#111827;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e2e8f0;padding:6px 10px;font-size:.72rem;outline:none;cursor:pointer;font-family:'Inter',sans-serif;transition:border-color .2s;color-scheme:dark}
input[type="date"]:focus{border-color:#f5a623}

.filter-row-1 {
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:8px;
  justify-content:center;
  margin-bottom:8px
}
.chips-scroll {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:center
}
.filter-row-2 {
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:8px;
  justify-content:center
}
.clear-btn-wrap {
  display:inline-flex;
  align-items:center;
  margin-left:6px
}
.mobile-break {
  display:none
}

/* ── STATUS BAR ───────────────────────────── */
.status-bar{display:flex;align-items:center;gap:8px;font-size:.7rem}
.refresh-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0;animation:none}
.refresh-dot.loading{background:#f5a623;animation:blink-dot 1s ease-in-out infinite}
.refresh-dot.error{background:#ef4444}
@keyframes blink-dot{0%,100%{opacity:1}50%{opacity:.3}}
.progress-bar{height:2px;background:rgba(255,255,255,0.06);border-radius:1px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,#f5a623,#fbbf24);border-radius:1px;transition:width 1s linear}
.source-badge{font-size:.58rem;padding:2px 7px;border-radius:4px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.2);color:#818cf8;font-weight:600}

/* ── EMPTY/ERROR ──────────────────────────── */
.empty{text-align:center;padding:56px 16px;color:#334155}
.empty i{font-size:2.5rem;margin-bottom:14px;display:block;opacity:.4}

/* ── SCROLLBAR ────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#080c18}
::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:3px}

/* ── LIVE PULSE ───────────────────────────── */
.live-glow{animation:live-glow 2s ease-in-out infinite}
@keyframes live-glow{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 12px 2px rgba(239,68,68,0.2)}}

/* ── STANDINGS TABLE ──────────────────────── */
.standings-section{margin-bottom:28px}
.group-title{
  font-size:.78rem;font-weight:800;letter-spacing:1.2px;color:#f5a623;
  padding:10px 14px;background:rgba(245,166,35,0.06);
  border-bottom:1px solid rgba(245,166,35,0.12);
  display:flex;align-items:center;gap:8px
}
.standings-table{width:100%;border-collapse:collapse;table-layout:fixed}
.standings-table thead tr{border-bottom:1px solid rgba(255,255,255,0.06)}
.standings-table th{
  font-size:.6rem;font-weight:700;letter-spacing:.8px;color:#4a5568;
  padding:8px 10px;text-align:center;white-space:nowrap
}
.standings-table th.team-th{text-align:left;padding-left:14px}
.standings-table td{
  font-size:.78rem;padding:10px 10px;text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.04);transition:background .15s;
  white-space:nowrap
}
.standings-table tbody tr:hover{background:rgba(255,255,255,0.03)}
.standings-table td.team-td{text-align:left;padding-left:14px}
.standings-table tbody tr:last-child td{border-bottom:none}
.pos-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:5px;font-size:.68rem;font-weight:800;
}
.pos-1,.pos-2,.pos-3{background:rgba(245,166,35,0.12);color:#f5a623}
.pos-3{background:rgba(100,116,139,0.12);color:#94a3b8}
.pos-4{color:#374151}
.form-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 1px}
.form-W{background:#22c55e}.form-D{background:#f5a623}.form-L{background:#ef4444}.form-P{background:#334155}
.qualified-row td{border-left:2px solid transparent}
.qualified-row.q1 td:first-child{border-left:2px solid #22c55e}
.qualified-row.q2 td:first-child{border-left:2px solid #3b82f6}
.qualified-row.q3 td:first-child{border-left:2px solid #8b5cf6}
.standings-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:.62rem;color:#4a5568}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* ── KNOCKOUT BRACKET ─────────────────────── */
.tbd-team{color:#334155;font-style:italic}

/* ── MOBILE ───────────────────────────────── */
@media(max-width:640px){
  .team-flag{font-size:1.7rem}
  .score-main{font-size:1.25rem}
  .team-name{font-size:.68rem;max-width:70px}
  .score-block{min-width:68px}
  .main-tab{font-size:.72rem;padding:12px 4px}
  .standings-table td,.standings-table th{padding:8px 6px;font-size:.7rem}
  .hero{padding:20px 16px 10px}
  .hero-body{gap:12px;justify-content:center;text-align:center}
  .hero-brand{flex-direction:column;text-align:center;gap:8px}
  .hero-status{align-items:center;gap:4px}
  
  /* Mobile optimized filters */
  .filter-section {
    padding: 8px 0;
    top: 41px;
  }
  .filter-row-1 {
    display: flex;
    width: 100%;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    justify-content: center;
  }
  .chips-scroll {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 6px;
    justify-content: center;
    width: 100%;
  }
  .mobile-break {
    display: block;
    width: 100%;
    height: 0;
  }
  .filter-row-2 {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
    width: 100%;
  }
  .filter-row-2 .filter-label,
  .filter-row-2 .filter-divider {
    display: none;
  }
  .clear-btn-wrap {
    grid-column: span 2;
    text-align: center;
    margin-top: 4px;
    justify-content: center;
    margin-left: 0;
  }
  .filter-row-2 .sel-wrap,
  .filter-row-2 select,
  .filter-row-2 input[type="date"] {
    width: 100%;
  }
}

/* ── TAB PANELS ───────────────────────────── */
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── FILTER GROUPS ───────────────────────── */
.filter-label{font-size:.6rem;font-weight:700;letter-spacing:.8px;color:#374151;text-transform:uppercase;margin-right:2px;white-space:nowrap}
.filter-divider{width:1px;height:20px;background:rgba(255,255,255,0.07);margin:0 4px;flex-shrink:0}

</style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <div style="max-width:1100px;margin:0 auto">
    <div class="hero-body">
      <div class="hero-brand">
        <img src="WC26_Logo.avif" alt="FIFA World Cup 2026" class="trophy-glow"
             style="height:72px;width:auto;object-fit:contain;filter:drop-shadow(0 0 18px rgba(245,166,35,0.55))">
        <div>
          <div class="bebas" style="font-size:2.2rem;color:#fff;letter-spacing:3px;line-height:1">Copa do Mundo FIFA</div>
          <div class="bebas" style="font-size:1.15rem;color:#f5a623;letter-spacing:2.5px">2026 · EUA · MÉXICO · CANADÁ</div>
          <div style="font-size:.7rem;color:#334155;margin-top:2px">11 Jun → 19 Jul · 48 seleções · 104 jogos</div>
        </div>
      </div>
      <div class="hero-status">
        <div class="status-bar" id="statusBar">
          <div class="refresh-dot loading" id="statusDot"></div>
          <span id="statusText" style="color:#4a5568">Carregando...</span>
          <span class="source-badge" id="sourceLabel">API</span>
        </div>
        <div id="lastUpdate" style="font-size:.62rem;color:#334155"></div>
      </div>
    </div>
  </div>
</header>

<!-- MAIN TABS -->
<nav class="main-tabs">
  <button class="main-tab" id="mtab-standings" onclick="switchTab('standings')" aria-label="Classificação 1ª Fase">
    <i class="fa-solid fa-table-list"></i> Classificação 1ª Fase
  </button>
  <button class="main-tab active" id="mtab-matches" onclick="switchTab('matches')" aria-label="Jogos">
    <i class="fa-solid fa-futbol"></i> Jogos
  </button>
</nav>

<!-- ══════ TAB: CLASSIFICAÇÃO ══════ -->
<div class="tab-panel" id="panel-standings">
  <div style="max-width:1100px;margin:0 auto;padding:20px 16px 60px">
    <div id="standings-container">
      <div class="empty"><i class="fa-solid fa-spinner fa-spin"></i><div style="color:#4a5568;font-size:.85rem">Carregando classificação...</div></div>
    </div>
    <div class="standings-legend" style="margin-top:16px;padding:0 4px;justify-content:center">
      <div class="legend-item"><span class="legend-dot" style="background:#22c55e"></span> Classificado às Oitavas</div>
      <div class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span> Disputa vaga (melhor 3º)</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ef4444"></span> Eliminado</div>
    </div>
  </div>
</div>

<!-- ══════ TAB: JOGOS ══════ -->
<div class="tab-panel active" id="panel-matches">

  <!-- FILTER BAR -->
  <div class="filter-section" id="filter-section">
    <div style="max-width:1100px;margin:0 auto;padding:0 16px">
      <!-- Row 1: Quick filters -->
      <div class="filter-row-1">
        <div class="chips-scroll">
          <button class="filter-chip live-chip" id="chip-live" onclick="setLiveFilter()">
            <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#ef4444;margin-right:4px;animation:pulse-dot 1.2s infinite"></span>Ao Vivo
          </button>
          <button class="filter-chip" id="btn-prev-day" onclick="navigateDay(-1)" title="Dia Anterior" style="padding: 5px 12px; display: inline-flex; align-items: center; justify-content: center;">
            <i class="fa-solid fa-chevron-left"></i>
          </button>
          <button class="filter-chip" id="btn-next-day" onclick="navigateDay(1)" title="Próximo Dia" style="padding: 5px 12px; display: inline-flex; align-items: center; justify-content: center;">
            <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>
      </div>
      <!-- Row 2: Selects & Date -->
      <div class="filter-row-2">
        <span class="filter-label">Fase</span>
        <div class="sel-wrap">
          <select id="phaseSel" onchange="render()" aria-label="Fase">
            <option value="">Todas as fases</option>
            <option value="group">Fase de Grupos</option>
            <option value="r32">16 Avos de Final</option>
            <option value="r16">Oitavas de Final</option>
            <option value="qf">Quartas de Final</option>
            <option value="sf">Semifinais</option>
            <option value="f">Final</option>
          </select>
          <i class="fa-solid fa-chevron-down"></i>
        </div>
        <div class="filter-divider"></div>
        <span class="filter-label">País</span>
        <div class="sel-wrap">
          <select id="teamSel" onchange="render()" aria-label="País">
            <option value="">Todas as seleções</option>
          </select>
          <i class="fa-solid fa-chevron-down"></i>
        </div>
        <div class="filter-divider"></div>
        <span class="filter-label">Grupo</span>
        <div class="sel-wrap">
          <select id="groupSel" onchange="render()" aria-label="Grupo">
            <option value="">Todos os grupos</option>
          </select>
          <i class="fa-solid fa-chevron-down"></i>
        </div>
        <div class="filter-divider"></div>
        <span class="filter-label">Data</span>
        <input type="date" id="datePicker" onchange="setDateFilter(this.value)" title="Filtrar por data"/>
        
        <div class="clear-btn-wrap">
          <button onclick="clearFilters()" style="font-size:.65rem;color:#4a5568;background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif" title="Limpar filtros">
            <i class="fa-solid fa-xmark mr-1"></i>Limpar
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- MATCHES CONTENT -->
  <div style="max-width:1100px;margin:0 auto;padding:16px 16px 80px" id="matches-wrap">
    <div id="matches-container"></div>
  </div>
</div>

<script>
const FD_COMP  = 2000;
const REFRESH_SECS = 30;

// Configuração dos Proxies anti-CORS (Bypass CORS & Hide API Token)
// Localmente, utiliza o proxy.py rodando em localhost:8765
// Em produção (GitHub Pages), utiliza a URL do seu Cloudflare Worker
const PROXY_LOCAL = 'http://localhost:8765';
const PROXY_PROD  = 'https://copa2026-proxy.diogopelaes.workers.dev';

const FD_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? PROXY_LOCAL
  : PROXY_PROD;

// ═══════════════════════════════════════════════════

function teamFlag(name) {
  if (!name || name.match(/^[123WL]/)) {
    return `<span class="flag-placeholder">❓</span>`;
  }
  const code = CODES[name];
  if (!code) return `<span class="flag-placeholder">🏳️</span>`;
  return `<img src="assets/flags/${code.toLowerCase()}.svg" alt="${name}" loading="lazy">`;
}

window.addEventListener('DOMContentLoaded', async () => {
  loadFromSeed();
  populateSelectors();

  const todayStr = todayBSBString();
  dateFilter = todayStr;
  document.getElementById('datePicker').value = todayStr;
  render();
  renderStandings();

  // Auto-refresh every 30s
  setInterval(fetchLive, REFRESH_SECS * 1000);
});

function todayBSBString() {
  return new Intl.DateTimeFormat('fr-CA', {
    timeZone: 'America/Sao_Paulo',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit'
  }).format(new Date());
}

function loadFromSeed() {
  matches = SEED.matches.map(m => normalizeSeedMatch(m));
}

function normalizeSeedMatch(m) {
  const kickoffBSB = utcTimeToBrasilia(m.date, m.time || '12:00 UTC+0');
  const status = deriveStatus(m, kickoffBSB);
  const isTBD = !m.team1 || m.team1.match(/^[123WL]/);
  return {
    id: `${m.date}_${m.team1}_${m.team2}`,
    num: m.num || null,
    round: m.round,
    group: m.group || null,
    date: m.date,
    kickoffBSB,
    team1: m.team1,
    team2: m.team2,
    team1Resolved: isTBD ? null : m.team1,
    team2Resolved: isTBD ? null : m.team2,
    ground: m.ground,
    score: m.score || null,
    goals1: m.goals1 || [],
    goals2: m.goals2 || [],
    status,
    minute: m.minute || null,
    source: 'seed',
  };
}

// ═══════════════════════════════════════════════════
// TIME UTILITIES
// ═══════════════════════════════════════════════════
function utcTimeToBrasilia(dateStr, timeStr) {
  const match = timeStr.match(/(\d+):(\d+)\s+UTC([+-]\d+)/);
  if (!match) return null;
  const [,h,min,off] = match;
  const utcHour = parseInt(h) - parseInt(off);
  const dt = new Date(`${dateStr}T00:00:00Z`);
  dt.setUTCHours(utcHour, parseInt(min), 0, 0);
  return dt; // keep as UTC, display in BSB
}

function deriveStatus(m, kickoff) {
  if (m.score?.ft) return 'FINISHED';
  if (!kickoff) return 'SCHEDULED';
  const now = new Date();
  const diff = (now - kickoff) / 60000;
  if (diff < 0) return 'SCHEDULED';
  if (diff < 115) return 'IN_PLAY';
  return 'SCHEDULED';
}

function formatTimeBSB(dt) {
  if (!dt) return '—';
  return dt.toLocaleTimeString('pt-BR', { timeZone:'America/Sao_Paulo', hour:'2-digit', minute:'2-digit', hour12:false });
}

function formatDateBSB(dt) {
  if (!dt) return '—';
  return dt.toLocaleDateString('pt-BR', { timeZone:'America/Sao_Paulo', day:'2-digit', month:'2-digit', weekday:'short' });
}

function getDateBSBStr(dt) {
  if (!dt) return '';
  return new Intl.DateTimeFormat('fr-CA', {
    timeZone: 'America/Sao_Paulo',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit'
  }).format(dt);
}

function isToday(dt) {
  return getDateBSBStr(dt) === todayBSBString();
}

function getTomorrowBSBStr() {
  const todayB = todayBSBString();
  const [y, m, d] = todayB.split('-').map(Number);
  const nextDay = new Date(Date.UTC(y, m - 1, d + 1));
  return nextDay.toISOString().split('T')[0];
}

function isTomorrow(dt) {
  return getDateBSBStr(dt) === getTomorrowBSBStr();
}

// ═══════════════════════════════════════════════════
// LIVE API
// ═══════════════════════════════════════════════════
async function fetchLive() {
  setStatus('loading','Atualizando...');
  try {
    const res = await fetch(`${FD_BASE}/competitions/${FD_COMP}/matches`);
    // Sem X-Auth-Token aqui — o proxy.py injeta a key no lado servidor
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    mergeLiveData(data.matches || []);
    setStatus('ok', `Atualizado · ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`);
    document.getElementById('sourceLabel').textContent = 'football-data.org';
    document.getElementById('lastUpdate').textContent = `Última atualização: ${new Date().toLocaleString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
  } catch(e) {
    setStatus('error','Dados locais (sem API)');
    document.getElementById('sourceLabel').textContent = 'offline';
  }
  render();
  renderStandings();
}

function mergeLiveData(fdMatches) {
  if (!Array.isArray(fdMatches)) return;

  fdMatches.forEach(fdm => {
    const t1raw = fdm.homeTeam?.name || '';
    const t2raw = fdm.awayTeam?.name || '';
    const t1 = FD_TO_OFB[t1raw] || t1raw;
    const t2 = FD_TO_OFB[t2raw] || t2raw;

    if (!t1 && !t2) return;

    // 1. Try finding exact match by team names (in either order)
    let idx = matches.findIndex(x => 
      (x.team1 === t1 && x.team2 === t2) || (x.team1 === t2 && x.team2 === t1)
    );

    let isReversed = false;
    if (idx >= 0) {
      isReversed = (matches[idx].team1 === t2 && matches[idx].team2 === t1);
    } else {
      // 2. For knockouts where teams might be TBD in seed: match by match number or round/date
      if (fdm.stage && fdm.stage !== 'GROUP_STAGE') {
        const targetRound = stageToRound(fdm.stage);
        const fdmDateStr = fdm.utcDate ? new Date(fdm.utcDate).toISOString().split('T')[0] : null;
        idx = matches.findIndex(x => x.round === targetRound && (x.team1?.match(/^[123WL]/) || x.team2?.match(/^[123WL]/)) && x.date === fdmDateStr);
      }
    }

    if (idx < 0) {
      // Only push a new match if it's a knockout match not present in seed
      if (fdm.stage && fdm.stage !== 'GROUP_STAGE') {
        const parsedScore = buildScore(fdm, false);
        const { goals1, goals2 } = extractGoals(fdm, false);
        matches.push({
          id: `${fdm.utcDate}_${t1}_${t2}`,
          num: null,
          round: stageToRound(fdm.stage),
          group: fdm.group || null,
          date: fdm.utcDate?.split('T')[0],
          kickoffBSB: fdm.utcDate ? new Date(fdm.utcDate) : null,
          team1: t1 || fdm.homeTeam?.name,
          team2: t2 || fdm.awayTeam?.name,
          team1Resolved: t1 || null,
          team2Resolved: t2 || null,
          ground: fdm.venue || '',
          score: parsedScore,
          goals1: goals1 || [],
          goals2: goals2 || [],
          status: fdm.status,
          minute: fdm.minute || null,
          source: 'live',
        });
      }
      return;
    }

    const m = matches[idx];
    m.status = fdm.status;
    m.minute = fdm.minute || null;

    const newScore = buildScore(fdm, isReversed);
    if (newScore) m.score = newScore;

    const { goals1, goals2 } = extractGoals(fdm, isReversed);
    if (goals1) m.goals1 = goals1;
    if (goals2) m.goals2 = goals2;

    m.source = 'live';
    if (fdm.utcDate) m.kickoffBSB = new Date(fdm.utcDate);

    // Update team names if they were placeholder TBDs
    if (isReversed) {
      if (t2 && (!m.team1 || m.team1.match(/^[123WL]/))) { m.team1 = t2; m.team1Resolved = t2; }
      if (t1 && (!m.team2 || m.team2.match(/^[123WL]/))) { m.team2 = t1; m.team2Resolved = t1; }
    } else {
      if (t1 && (!m.team1 || m.team1.match(/^[123WL]/))) { m.team1 = t1; m.team1Resolved = t1; }
      if (t2 && (!m.team2 || m.team2.match(/^[123WL]/))) { m.team2 = t2; m.team2Resolved = t2; }
    }
  });
}

function stageToRound(stage) {
  const map = {
    'LAST_32':'Round of 32','LAST_16':'Round of 16',
    'QUARTER_FINALS':'Quarter-final','SEMI_FINALS':'Semi-final',
    'THIRD_PLACE':'Match for third place','FINAL':'Final',
  };
  return map[stage] || stage;
}

function extractPair(periodObj, isReversed) {
  if (!periodObj) return null;
  const h = periodObj.home ?? periodObj.homeTeam;
  const a = periodObj.away ?? periodObj.awayTeam;
  if (h == null || a == null) return null;
  return isReversed ? [a, h] : [h, a];
}

function buildScore(fdm, isReversed = false) {
  const s = fdm.score;
  if (!s) return null;
  const ft = extractPair(s.fullTime, isReversed);
  if (!ft) return null;
  const out = { ft };
  const ht = extractPair(s.halfTime, isReversed);
  if (ht) out.ht = ht;
  const et = extractPair(s.extraTime, isReversed);
  if (et) out.et = et;
  const p = extractPair(s.penalties, isReversed);
  if (p) out.p = p;
  return out;
}

function extractGoals(fdm, isReversed = false) {
  if (!fdm.goals || !Array.isArray(fdm.goals) || fdm.goals.length === 0) {
    return { goals1: null, goals2: null };
  }
  const goals1 = [];
  const goals2 = [];
  const t1raw = fdm.homeTeam?.name || '';
  const homeTeamName = FD_TO_OFB[t1raw] || t1raw;

  fdm.goals.forEach(g => {
    const scorerName = g.scorer?.name || 'Gol';
    const min = g.minute ? String(g.minute) + (g.extraTime ? `+${g.extraTime}` : '') : '';
    const goalObj = {
      name: scorerName,
      minute: min,
      penalty: g.type === 'PENALTY',
      owngoal: g.type === 'OWN_GOAL'
    };
    const isHomeGoal = g.team?.name ? (FD_TO_OFB[g.team.name] || g.team.name) === homeTeamName : true;
    
    if (isHomeGoal) {
      if (isReversed) goals2.push(goalObj); else goals1.push(goalObj);
    } else {
      if (isReversed) goals1.push(goalObj); else goals2.push(goalObj);
    }
  });
  return { goals1, goals2 };
}

function populateSelectors() {
  // Teams
  const sel = document.getElementById('teamSel');
  const teams = [...new Set(SEED.matches.flatMap(m => [m.team1, m.team2]).filter(t => !t.match(/^[123WL]/)))].sort();

// ═══════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════
function setLiveFilter() {
  quickFilter = 'live';
  dateFilter = '';
  const picker = document.getElementById('datePicker');
  if (picker) picker.value = '';
  document.getElementById('chip-live')?.classList.add('active');
  render();
}

function setDateFilter(val) {
  dateFilter = val;
  quickFilter = '';
  const picker = document.getElementById('datePicker');
  if (picker) picker.value = val;
  document.getElementById('chip-live')?.classList.remove('active');
  render();
}

function clearFilters() {
  quickFilter = '';
  dateFilter = todayBSBString();
  const picker = document.getElementById('datePicker');
  if (picker) picker.value = dateFilter;
  document.getElementById('phaseSel').value = '';
  document.getElementById('teamSel').value = '';
  document.getElementById('groupSel').value = '';
  document.getElementById('chip-live')?.classList.remove('active');
  render();
}

function navigateDay(offset) {
  let baseDateStr = dateFilter || todayBSBString();
  const [y, m, d] = baseDateStr.split('-').map(Number);
  const baseDate = new Date(Date.UTC(y, m - 1, d));
  baseDate.setUTCDate(baseDate.getUTCDate() + offset);
  const newDateStr = baseDate.toISOString().split('T')[0];
  setDateFilter(newDateStr);
}

function getFiltered() {
  const phase  = document.getElementById('phaseSel')?.value || '';
  const team   = document.getElementById('teamSel')?.value || '';
  const group  = document.getElementById('groupSel')?.value || '';

  return matches.filter(m => {
    // Quick filter
    if (quickFilter === 'live') {
      if (!['IN_PLAY','PAUSED','EXTRA_TIME','PENALTY_SHOOTOUT'].includes(m.status)) return false;
    }

    // Date filter
    if (dateFilter) {
      if (getDateBSBStr(m.kickoffBSB) !== dateFilter) return false;
    }

    // Phase filter
    if (phase) {
      if (phase === 'group' && m.group == null) return false;
      if (phase !== 'group') {
        const rp = ROUND_PHASE[m.round] || '';
        if (rp !== phase) return false;
      }
    }

    // Team filter
    if (team && m.team1 !== team && m.team2 !== team) return false;

    // Group filter
    if (group && m.group !== group) return false;

    return true;
  });
}

// ═══════════════════════════════════════════════════
// RENDER MATCHES
// ═══════════════════════════════════════════════════
function render() {
  const container = document.getElementById('matches-container');
  if (!container) return;

  const filtered = getFiltered();

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty"><i class="fa-solid fa-calendar-xmark"></i><div style="color:#4a5568;font-size:.85rem">Nenhum jogo encontrado para este filtro.</div></div>`;
    return;
  }

  // Group by round, then by date within round
  const byRound = {};
  const roundOrder = [];
  filtered.forEach(m => {
    const r = m.round.startsWith('Matchday') ? 'Fase de Grupos' : m.round;
    if (!byRound[r]) { byRound[r] = {}; roundOrder.push(r); }
    const d = getDateBSBStr(m.kickoffBSB) || m.date;
    if (!byRound[r][d]) byRound[r][d] = [];
    byRound[r][d].push(m);
  });

  roundOrder.sort((a,b) => {
    const aAll = Object.values(byRound[a]).flat();
    const bAll = Object.values(byRound[b]).flat();
    const da = aAll[0]?.kickoffBSB; const db = bAll[0]?.kickoffBSB;
    if (!da) return 1; if (!db) return -1; return da - db;
  });

  let html = '';
  roundOrder.forEach(round => {
    const label = ROUND_LABEL[round] || round;
    const datesInRound = Object.keys(byRound[round]).sort();
    html += `<div style="margin-bottom:28px">
      <div class="round-header" style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px">
        <div class="round-line" style="background:linear-gradient(to left,rgba(245,166,35,0.15),transparent)"></div>
        <div class="round-pill">${label}</div>
        <div class="round-line" style="background:linear-gradient(to right,rgba(245,166,35,0.15),transparent)"></div>
      </div>`;
    datesInRound.forEach(dateStr => {
      const ms = byRound[round][dateStr].slice().sort((a,b)=>(a.kickoffBSB||0)-(b.kickoffBSB||0));
      if (datesInRound.length > 1) {
        const dateLabel = ms[0]?.kickoffBSB ? formatDateBSB(ms[0].kickoffBSB) : dateStr;
        html += `<div style="font-size:.65rem;color:#374151;font-weight:600;letter-spacing:.6px;margin:6px 0 8px;text-transform:uppercase;text-align:center">${dateLabel}</div>`;
      }
      html += `<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:10px">
        ${ms.map(m => renderMatch(m)).join('')}
      </div>`;
    });
    html += '</div>';
  });

  container.innerHTML = html;
}

function renderMatch(m) {
  const isLive = ['IN_PLAY','PAUSED','EXTRA_TIME','PENALTY_SHOOTOUT'].includes(m.status);
  const isDone = m.status === 'FINISHED';
  const isBrazil = m.team1 === 'Brazil' || m.team2 === 'Brazil';
  const isPen = !!m.score?.p;
  const isET  = !!m.score?.et && !isPen;

  // Handle TBD teams: show placeholder if not yet resolved
  const t1IsTBD = !m.team1 || m.team1.match(/^[123WL]/);
  const t2IsTBD = !m.team2 || m.team2.match(/^[123WL]/);
  const f1 = teamFlag(m.team1);
  const f2 = teamFlag(m.team2);
  const n1 = t1IsTBD ? (m.team1 || 'A definir') : m.team1;
  const n2 = t2IsTBD ? (m.team2 || 'A definir') : m.team2;

  // Score display
  let scoreHtml = '';
  if (m.score?.ft) {
    const [h,a] = m.score.ft;
    const ht = m.score.ht;
    const penLine = isPen ? `<div class="score-pen">Pen: ${m.score.p[0]}–${m.score.p[1]}</div>` : '';
    const htLine  = ht ? `<div class="score-ht">HT ${ht[0]}–${ht[1]}</div>` : '';
    const col = isLive ? '#f87171' : '#ffffff';
    scoreHtml = `<div class="score-block">
      <div class="score-main" style="color:${col}">${h}<span class="score-sep">–</span>${a}</div>
      ${htLine}${penLine}
    </div>`;
  } else {
    const t = m.kickoffBSB ? formatTimeBSB(m.kickoffBSB) : '—';
    scoreHtml = `<div class="score-block"><div class="no-score" style="color:#f5a623">${t}h</div><div style="font-size:.55rem;color:#334155">Brasília</div></div>`;
  }

  // Badge
  let badge = '';
  if (isLive) {
    const minText = m.minute ? `${m.minute}'` : 'AO VIVO';
    badge = `<span class="badge badge-live"><span class="dot"></span>${minText}</span>`;
  } else if (isPen) {
    badge = `<span class="badge badge-pen"><i class="fa-solid fa-circle-dot" style="margin-right:2px"></i>Pênaltis</span>`;
  } else if (isET) {
    badge = `<span class="badge badge-et">Prorrogação</span>`;
  } else if (isDone) {
    badge = `<span class="badge badge-ft">Encerrado</span>`;
  } else {
    const d = m.kickoffBSB ? formatDateBSB(m.kickoffBSB) : m.date;
    badge = `<span class="badge badge-sched">${d}</span>`;
  }
  
  if (isLive || isDone || isPen || isET) {
    const dShort = m.kickoffBSB 
      ? `${m.kickoffBSB.toLocaleDateString('pt-BR', { timeZone:'America/Sao_Paulo', day:'2-digit', month:'2-digit' })} · ${formatTimeBSB(m.kickoffBSB)}` 
      : m.date;
    badge += ` <span class="badge" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#64748b">${dShort}</span>`;
  }
  
  if (isBrazil) badge += ` <span class="badge badge-brazil"><img src="assets/flags/bra.svg" alt="Brasil" style="width:1.1em;height:1.1em;vertical-align:middle;margin-right:4px;display:inline-block">Brasil</span>`;

  // Winner for knockout
  let w1 = false, w2 = false;
  if (isDone && m.score?.ft && !m.group) {
    if (isPen) { w1 = m.score.p[0] > m.score.p[1]; w2 = !w1; }
    else { w1 = m.score.ft[0] > m.score.ft[1]; w2 = m.score.ft[0] < m.score.ft[1]; }
  }

  // Goals
  const goalsHtml = (m.score?.ft && (m.goals1?.length || m.goals2?.length)) ? `
    <div style="display:flex;gap:8px;padding:6px 12px 10px;min-height:18px">
      <div style="flex:1;display:flex;flex-direction:column;align-items:flex-end;gap:2px">
        ${m.goals1.map(g => `<span class="goal-item">${g.name} <span class="min">${g.minute}'</span>${g.penalty?'<span class="pen-mark"> (P)</span>':''}${g.owngoal?'<span class="og-mark"> (AG)</span>':''}</span>`).join('')}
      </div>
      <div style="width:1px;background:rgba(255,255,255,0.05);flex-shrink:0"></div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:2px">
        ${m.goals2.map(g => `<span class="goal-item">${g.name} <span class="min">${g.minute}'</span>${g.penalty?'<span class="pen-mark"> (P)</span>':''}${g.owngoal?'<span class="og-mark"> (AG)</span>':''}</span>`).join('')}
      </div>
    </div>` : '';

  const ground = m.ground ? `<i class="fa-solid fa-location-dot" style="margin-right:4px;color:#334155"></i>${m.ground}` : '';

  return `
  <div class="match-card ${isBrazil?'brazil':''} ${isLive?'live-card live-glow':''}">
    ${isBrazil ? '<div class="brazil-bar"></div>' : ''}
    <div style="${isBrazil?'padding-left:7px':''}">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px 6px;gap:8px">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">${badge}</div>
        <div class="meta-row" style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ground}</div>
      </div>
      <div style="display:flex;align-items:center;padding:2px 12px 10px;gap:4px">
        <div class="team-col" style="align-items:center;text-align:center">
          <span class="team-flag">${f1}</span>
          <span class="team-code ${w1?'winner':''} ${t1IsTBD?'tbd':''}">${t1IsTBD ? n1 : (CODES[m.team1]||n1)}</span>
          <span class="team-name ${t1IsTBD?'tbd':''}">${t1IsTBD ? '' : n1}</span>
        </div>
        ${scoreHtml}
        <div class="team-col" style="align-items:center;text-align:center">
          <span class="team-flag">${f2}</span>
          <span class="team-code ${w2?'winner':''} ${t2IsTBD?'tbd':''}">${t2IsTBD ? n2 : (CODES[m.team2]||n2)}</span>
          <span class="team-name ${t2IsTBD?'tbd':''}">${t2IsTBD ? '' : n2}</span>
        </div>
      </div>
      ${goalsHtml}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════
// RENDER STANDINGS
// ═══════════════════════════════════════════════════
function renderStandings() {
  const container = document.getElementById('standings-container');
  if (!container) return;

  const groups = {};
  matches.forEach(m => {
    if (!m.group) return;
    if (!groups[m.group]) {
      groups[m.group] = { teams: {}, matches: [] };
    }
    const g = groups[m.group];
    g.matches.push(m);
    [m.team1, m.team2].forEach(t => {
      if (!t || t.match(/^[123WL]/)) return;
      if (!g.teams[t]) g.teams[t] = { name:t, played:0, won:0, drawn:0, lost:0, gf:0, ga:0, pts:0, form:[] };
    });
  });

  // Compute standings from finished matches
  Object.values(groups).forEach(g => {
    g.matches.forEach(m => {
      if (m.status !== 'FINISHED' || !m.score?.ft) return;
      const [h,a] = m.score.ft;
      const t1 = g.teams[m.team1];
      const t2 = g.teams[m.team2];
      if (!t1 || !t2) return;
      t1.played++; t2.played++;
      t1.gf += h; t1.ga += a;
      t2.gf += a; t2.ga += h;
      if (h > a) {
        t1.won++; t1.pts+=3; t1.form.push('W');
        t2.lost++; t2.form.push('L');
      } else if (h < a) {
        t2.won++; t2.pts+=3; t2.form.push('W');
        t1.lost++; t1.form.push('L');
      } else {
        t1.drawn++; t1.pts++; t1.form.push('D');
        t2.drawn++; t2.pts++; t2.form.push('D');
      }
    });
  });

  const sortedGroups = Object.keys(groups).sort();
  let html = '';

  sortedGroups.forEach(grpName => {
    const g = groups[grpName];
    const teamsArr = Object.values(g.teams).sort((a,b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      const gdA = a.gf - a.ga; const gdB = b.gf - b.ga;
      if (gdB !== gdA) return gdB - gdA;
      return b.gf - a.gf;
    });
    // Fill to 4 if missing
    while (teamsArr.length < 4) teamsArr.push(null);

    html += `<div class="standings-section card" style="margin:0 auto 16px;max-width:620px">
      <div class="group-title" style="justify-content:center">
        <i class="fa-solid fa-layer-group" style="font-size:.72rem;opacity:.6"></i>
        ${grpName}
      </div>
      <div style="overflow-x:auto">
        <table class="standings-table">
          <thead>
            <tr>
              <th style="width:35px">#</th>
              <th class="team-th" style="width:230px;text-align:left;padding-left:14px">Seleção</th>
              <th title="Jogos" style="width:40px">J</th>
              <th title="Vitórias" style="width:40px">V</th>
              <th title="Empates" style="width:40px">E</th>
              <th title="Derrotas" style="width:40px">D</th>
              <th title="Gols Pró" style="width:40px">GP</th>
              <th title="Gols Contra" style="width:40px">GC</th>
              <th title="Saldo de Gols" style="width:45px">SG</th>
              <th title="Pontos" style="width:50px;color:#f5a623">Pts</th>
            </tr>
          </thead>
          <tbody>
          ${teamsArr.map((t,i) => {
            if (!t) return `<tr><td><span class="pos-badge pos-${i+1}">${i+1}</span></td><td class="team-td" colspan="9" style="color:#1e293b;font-style:italic">—</td></tr>`;
            const sg = t.gf - t.ga;
            const posClass = i === 0 ? 'pos-1' : i === 1 ? 'pos-2' : i === 2 ? 'pos-3' : 'pos-4';
            const rowQual = i < 2 ? 'qualified-row q1' : i === 2 ? 'qualified-row q2' : 'qualified-row q3';
            const formDots = t.form.slice(-3).map(f => `<span class="form-dot form-${f}" title="${f==='W'?'Vitória':f==='D'?'Empate':'Derrota'}"></span>`).join('');
            const noGames = t.played === 0;
            return `<tr class="${rowQual}">
              <td><span class="pos-badge ${posClass}">${i+1}</span></td>
              <td class="team-td">
                <span class="team-flag" style="margin-right:6px;font-size:1.25rem;display:inline-flex;vertical-align:middle">${teamFlag(t.name)}</span>
                <span style="font-weight:800;color:#e2e8f0;font-size:.72rem;letter-spacing:1px;margin-right:5px">${CODES[t.name]||''}</span>
                <span style="color:#475569;font-size:.68rem">${t.name}</span>
              </td>
              <td style="color:${noGames?'#334155':'#94a3b8'}">${t.played}</td>
              <td style="color:${t.won>0?'#22c55e':'#334155'}">${t.won}</td>
              <td style="color:${t.drawn>0?'#f5a623':'#334155'}">${t.drawn}</td>
              <td style="color:${t.lost>0?'#ef4444':'#334155'}">${t.lost}</td>
              <td>${t.gf}</td>
              <td>${t.ga}</td>
              <td style="color:${sg>0?'#22c55e':sg<0?'#ef4444':'#94a3b8'};font-weight:600">${sg>0?'+':''}${sg}</td>
              <td style="font-weight:800;color:#f5a623;font-size:.85rem">${t.pts}</td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  });

  container.innerHTML = html || '<div class="empty"><i class="fa-solid fa-circle-info"></i><div>Nenhum dado disponível</div></div>';
}


</script>
</body>
</html>
